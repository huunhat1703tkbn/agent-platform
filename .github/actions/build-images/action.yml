name: Build Seta images
description: |
  Multi-arch buildx for seta-server and seta-web. Logs into ECR using AWS
  credentials already configured by the caller. Caller decides whether to push.

inputs:
  image:
    description: 'Which image to build: seta-server or seta-web'
    required: true
  dockerfile:
    description: 'Dockerfile path (relative to repo root)'
    required: true
  tags:
    description: 'Newline-separated list of full image refs to tag'
    required: true
  labels:
    description: 'Newline-separated list of OCI labels'
    required: false
    default: ''
  platforms:
    description: 'buildx platforms; default linux/amd64,linux/arm64'
    required: false
    default: 'linux/amd64,linux/arm64'
  push:
    description: '"true" to push to the registry; "false" to build only'
    required: false
    default: 'false'
  ecr-registry:
    description: 'ECR registry hostname (e.g. YOUR_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com)'
    required: true
  cache-ref:
    description: 'Registry ref for build cache (e.g. <ecr-registry>/repo:buildcache)'
    required: true

outputs:
  digest:
    description: 'sha256 digest of the pushed multi-arch manifest list'
    value: ${{ steps.build.outputs.digest }}
  metadata:
    description: 'JSON metadata emitted by build-push-action'
    value: ${{ steps.build.outputs.metadata }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4.0.0

    - name: Set up Buildx
      uses: docker/setup-buildx-action@v4.1.0

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2.1.5
      with:
        registries: ${{ inputs.ecr-registry }}

    - name: Build and (maybe) push
      id: build
      uses: docker/build-push-action@v7.2.0
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
        cache-from: type=registry,ref=${{ inputs.cache-ref }}
        cache-to: type=registry,ref=${{ inputs.cache-ref }},mode=max
        provenance: mode=max
        sbom: false
