name: Dev Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: dev-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  ECR_REGISTRY:   ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  AWS_REGION:     ${{ vars.AWS_REGION }}

jobs:
  metadata:
    name: Derive version & tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      minor: ${{ steps.parse.outputs.minor }}
      semver_ok: ${{ steps.parse.outputs.semver_ok }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - id: parse
        name: Parse tag into vX, vX.Y, vX.Y.Z (or dev-<sha> on manual dispatch)
        shell: bash
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          if [[ "$ref" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "version=$ref" >> "$GITHUB_OUTPUT"
            echo "major=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "minor=v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "semver_ok=true" >> "$GITHUB_OUTPUT"
          else
            # Manual workflow_dispatch (non-tag): derive a dev version from the SHA.
            # The ECR release jobs are skipped in this mode — only deploy-dev runs,
            # building images locally on the `future` host.
            echo "version=dev-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
            echo "semver_ok=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & push ${{ matrix.image.name }}
    needs: metadata
    if: startsWith(github.ref, 'refs/tags/v')   # ECR release path; dev dispatch builds locally
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        image:
          - { name: seta-server, dockerfile: infra/docker/server.Dockerfile }
          - { name: seta-web,    dockerfile: infra/docker/web.Dockerfile }
    outputs:
      server_digest: ${{ steps.collect.outputs.server_digest }}
      web_digest:    ${{ steps.collect.outputs.web_digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@6.1.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Build & push
        id: build
        uses: ./.github/actions/build-images
        with:
          image: ${{ matrix.image.name }}
          dockerfile: ${{ matrix.image.dockerfile }}
          ecr-registry: ${{ env.ECR_REGISTRY }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image.name == 'seta-server' && 'server' || 'web' }}-${{ needs.metadata.outputs.version }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image.name == 'seta-server' && 'server' || 'web' }}-${{ needs.metadata.outputs.minor }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image.name == 'seta-server' && 'server' || 'web' }}-${{ needs.metadata.outputs.major }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image.name == 'seta-server' && 'server' || 'web' }}-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.title=${{ matrix.image.name }}
          push: true
          cache-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image.name == 'seta-server' && 'server' || 'web' }}-buildcache

      - name: Collect digest per image
        id: collect
        shell: bash
        run: |
          if [[ "${{ matrix.image.name }}" == "seta-server" ]]; then
            echo "server_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          else
            echo "web_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          fi

  smoke:
    name: Smoke test seta-server
    needs: [metadata, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@6.1.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Pull and run health subcommand
        shell: bash
        run: |
          set -euo pipefail
          IMG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:server-${{ needs.metadata.outputs.version }}"
          echo "smoke target: $IMG"
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "${{ env.ECR_REGISTRY }}"
          docker pull "$IMG"
          docker run --rm "$IMG" health

  scan:
    name: Trivy scan
    needs: [metadata, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@6.1.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Scan seta-server (gating)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:server-${{ needs.metadata.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library

      - name: Scan seta-web (informational)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:web-${{ needs.metadata.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library

  sign:
    name: Cosign sign + SBOM attest
    needs: [metadata, build, smoke, scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: true
      matrix:
        image:
          - { name: seta-server, prefix: server, digest_ref: server_digest }
          - { name: seta-web,    prefix: web,    digest_ref: web_digest }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@6.1.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2.1.5

      - name: Resolve digest
        id: digest
        shell: bash
        run: |
          if [[ "${{ matrix.image.name }}" == "seta-server" ]]; then
            echo "value=${{ needs.build.outputs.server_digest }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ needs.build.outputs.web_digest }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign image (keyless OIDC)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          IMG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image.prefix }}-${{ needs.metadata.outputs.version }}"
          cosign sign --yes "$IMG"

      - name: Generate SPDX SBOM and attest
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image.prefix }}-${{ needs.metadata.outputs.version }}
          format: spdx-json
          output-file: sbom-${{ matrix.image.name }}.spdx.json
          upload-artifact: true

      - name: Attest SBOM with cosign
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          IMG="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image.prefix }}-${{ needs.metadata.outputs.version }}"
          cosign attest --yes \
            --predicate "sbom-${{ matrix.image.name }}.spdx.json" \
            --type spdxjson \
            "$IMG"

  web-s3:
    name: Sync web bundle to S3 + invalidate CloudFront
    if: ${{ startsWith(github.ref, 'refs/tags/v') && vars.PLATFORM_AWS_MIRROR == 'true' }}
    needs: [metadata, build, sign]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm turbo run build --filter=@seta/web

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8e97add9bf65ce70861f1b735d6e7820b0d772b0 # v6.1.1
        with:
          role-to-assume: ${{ vars.PLATFORM_AWS_ROLE_ARN }}
          aws-region: ${{ vars.PLATFORM_AWS_REGION }}
          role-session-name: gha-release-${{ github.run_id }}

      - name: Sync to S3 (versioned prefix)
        shell: bash
        env:
          BUCKET: ${{ vars.PLATFORM_S3_WEB_BUCKET }}
          V: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          aws s3 sync apps/web/dist/ "s3://${BUCKET}/${V}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp apps/web/dist/index.html "s3://${BUCKET}/${V}/index.html" \
            --cache-control "public,max-age=60,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        shell: bash
        env:
          DIST: ${{ vars.PLATFORM_CF_DISTRIBUTION_ID }}
          V: ${{ needs.metadata.outputs.version }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DIST}" \
            --paths "/${V}/*"

  github-release:
    name: Create GitHub Release
    needs: [metadata, build, sign]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
          SERVER_DIGEST: ${{ needs.build.outputs.server_digest }}
          WEB_DIGEST: ${{ needs.build.outputs.web_digest }}
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          ## Images (ECR)

          - \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:server-${VERSION}\` (digest: \`${SERVER_DIGEST}\`)
          - \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:web-${VERSION}\` (digest: \`${WEB_DIGEST}\`)

          ## Verification

          \`\`\`
          cosign verify ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:server-${VERSION} \\
            --certificate-identity-regexp='^https://github.com/${{ github.repository }}/\\.github/workflows/dev-release\\.yml@refs/tags/v.*\$' \\
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          \`\`\`

          See \`docs/hosting/upgrading.md\` for the full verification flow.
          EOF

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file release-notes.md \
            --generate-notes \
            --verify-tag

  # ── Build + deploy the dev stack on the on-prem GPU host (`future`) ─────────
  #
  # Dev/self-host deploy path. Images are built LOCALLY on the `future` runner
  # from source — no ECR, no AWS. Intentionally separate from the production
  # `hackathon-release.yml` flow.
  #
  # Trigger: `workflow_dispatch` (or a vX.Y.Z tag). On manual dispatch the ECR
  # release jobs above are skipped and only this job runs.
  #
  # PREREQUISITES (one-time):
  #   1. A self-hosted runner labeled `future` on the GPU host (private LAN
  #      192.168.90.127, unreachable from GitHub-hosted runners).
  #   2. Ollama running on the host, bound to 0.0.0.0:11434, model pulled:
  #        ollama pull gemma4:12b-it-qat
  #   3. Repo VARIABLES: DEV_APP_DOMAIN (e.g. 192.168.90.127), optional
  #      OLLAMA_BASE_URL, ACME_EMAIL.  Repo SECRET: OPENAI_API_KEY (embeddings
  #      stay on OpenAI — pgvector columns are sized to text-embedding-3 dims).
  deploy-dev:
    name: Build + deploy ${{ needs.metadata.outputs.version }} to dev (future)
    needs: [metadata]
    runs-on: [self-hosted, future]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build server + web images locally
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          echo "=== Building seta-server:${VERSION} ==="
          DOCKER_BUILDKIT=1 docker build -f infra/docker/server.Dockerfile -t "seta-server:${VERSION}" .
          echo "=== Building seta-web:${VERSION} ==="
          DOCKER_BUILDKIT=1 docker build -f infra/docker/web.Dockerfile -t "seta-web:${VERSION}" .

      - name: Write runtime .env (self-hosted Gemma + OpenAI embeddings)
        shell: bash
        env:
          VERSION:         ${{ needs.metadata.outputs.version }}
          DEV_APP_DOMAIN:  ${{ vars.DEV_APP_DOMAIN }}
          ACME_EMAIL:      ${{ vars.ACME_EMAIL || 'devops@seta-international.vn' }}
          # Reachable from inside the compose containers. Default targets the
          # host via its LAN IP; requires Ollama bound to 0.0.0.0. Override with
          # the `OLLAMA_BASE_URL` repo variable if the host address differs.
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://192.168.90.127:11434/v1' }}
          OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          # Persist generated secrets across deploys (survive redeploys without
          # living in GitHub Secrets). Delete this file to re-init the DB cleanly.
          SECRETS_FILE="$HOME/.seta-dev-secrets.env"
          if [ ! -f "$SECRETS_FILE" ]; then
            echo "=== First deploy: generating persistent app secrets ==="
            printf 'POSTGRES_PASSWORD=%s\nBETTER_AUTH_SECRET=%s\nCRYPTO_LOCAL_MASTER_KEY=%s\n' \
              "$(openssl rand -hex 16)" \
              "$(openssl rand -hex 32)" \
              "$(openssl rand -hex 32)" > "$SECRETS_FILE"
            chmod 600 "$SECRETS_FILE"
          fi
          # shellcheck source=/dev/null
          source "$SECRETS_FILE"

          SERVER_IMAGE="seta-server:${VERSION}"
          WEB_IMAGE="seta-web:${VERSION}"

          cat > .env.deploy <<EOF
          NODE_ENV=production
          PLATFORM_IMAGE_SERVER=${SERVER_IMAGE}
          PLATFORM_IMAGE_WEB=${WEB_IMAGE}
          PLATFORM_VERSION=${VERSION}
          PLATFORM_MODULES=*
          PLATFORM_DOMAIN=${DEV_APP_DOMAIN}
          PLATFORM_TLS_MODE=self-signed
          PLATFORM_ACME_EMAIL=${ACME_EMAIL}
          DATABASE_URL=postgres://seta:${POSTGRES_PASSWORD}@postgres:5432/seta
          POSTGRES_USER=seta
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=seta
          PORT=3000
          PUBLIC_URL=https://${DEV_APP_DOMAIN}
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          CRYPTO_KEY_PROVIDER=env
          CRYPTO_LOCAL_MASTER_KEY=${CRYPTO_LOCAL_MASTER_KEY}
          CORS_ORIGINS=https://${DEV_APP_DOMAIN}
          SESSION_COOKIE_SAMESITE=strict
          EVENTS_RETENTION_DAYS=30
          KNOWLEDGE_AV_REQUIRED=false
          MAILER_DEFAULT_TRANSPORT=dev-stub
          MAILER_DEFAULT_SENDER=noreply@${DEV_APP_DOMAIN}
          # ── Self-hosted chat model: Gemma 4 12B (QAT) via Ollama on this host ──
          AGENT_MODELS=ollama/gemma4:12b-it-qat:balanced
          AGENT_MODEL_DEFAULT=auto
          OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
          # Embeddings stay on OpenAI — pgvector columns are sized to its dims.
          EMBED_MODEL=openai/text-embedding-3-small
          OPENAI_API_KEY=${OPENAI_API_KEY}
          EOF
          chmod 600 .env.deploy

      - name: Migrate and bring up the stack (locally built images)
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file .env.deploy run --rm migrator
          docker compose --env-file .env.deploy up -d \
            --remove-orphans --wait --wait-timeout 300 \
            proxy server web worker

      - name: Smoke test (health/ready + model reachability)
        shell: bash
        env:
          DEV_APP_DOMAIN:  ${{ vars.DEV_APP_DOMAIN }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://192.168.90.127:11434/v1' }}
        run: |
          set -euo pipefail
          echo "=== Ollama reachable? ==="
          curl -sf "${OLLAMA_BASE_URL%/v1}/api/tags" >/dev/null \
            && echo "ok: ollama responding" \
            || { echo "❌ Ollama not reachable at ${OLLAMA_BASE_URL}"; exit 1; }

          echo "=== App health/ready ==="
          code=000
          for i in $(seq 1 12); do
            code=$(curl -sk -o /dev/null -w "%{http_code}" \
              --max-time 5 "https://${DEV_APP_DOMAIN}/health/ready" || true)
            [ "$code" = "200" ] && break
            echo "  attempt $i/12: HTTP $code — retrying in 5s…"
            sleep 5
          done
          [ "$code" = "200" ] \
            || { echo "❌ Smoke test failed (last HTTP status: $code)"; exit 1; }
          echo "✅ Dev deploy healthy"
