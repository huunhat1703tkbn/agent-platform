name: Hackathon — Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: 12-char SHA of HEAD)'
        required: false
        default: ''

concurrency:
  group: hackathon-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION:     ${{ vars.AWS_REGION }}
  ECR_REGISTRY:   ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  # ── 1. Compute a stable tag once; pass it to downstream jobs ─────────────
  prepare:
    name: Compute release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve image tag
        id: tag
        run: |
          INPUT="${{ github.event.inputs.tag }}"
          SHA="${GITHUB_SHA::12}"
          echo "value=${INPUT:-$SHA}" >> "$GITHUB_OUTPUT"

  # ── 2. Ensure ECR repository exists ──────────────────────────────────────
  ensure-ecr:
    name: Ensure ECR repository exists
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          aws-access-key-id:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" 2>/dev/null \
          || aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

  # ── 3. Build server and web images in parallel ───────────────────────────
  build:
    name: Build & push seta-${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [prepare, ensure-ecr]
    timeout-minutes: 30
    strategy:
      fail-fast: false          # let the other image finish even if one fails
      matrix:
        include:
          - service:    server
            dockerfile: infra/docker/server.Dockerfile
          - service:    web
            dockerfile: infra/docker/web.Dockerfile

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          aws-access-key-id:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build & push seta-${{ matrix.service }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file:      ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push:      true
          provenance: false      # avoid attestation manifest that confuses some ECR clients
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-${{ needs.prepare.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-latest
          # Two cache sources: GHA (fast, warm within the same week) falls
          # back to the ECR registry layer cache (persistent across runners).
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service }}
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-buildcache,mode=max

  # ── 3. Deploy only after both images are confirmed in ECR ─────────────────
  deploy:
    name: Deploy ${{ needs.prepare.outputs.tag }} to EC2
    runs-on: ubuntu-latest
    needs: [prepare, build]
    timeout-minutes: 15
    environment: production

    steps:
      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          ECR_REGISTRY:          ${{ env.ECR_REGISTRY }}
          ECR_REPOSITORY:        ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG:             ${{ needs.prepare.outputs.tag }}
          AWS_REGION:            ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          APP_DOMAIN:            ${{ vars.APP_DOMAIN }}
          POSTGRES_PASSWORD:     ${{ secrets.POSTGRES_PASSWORD }}
          BETTER_AUTH_SECRET:    ${{ secrets.BETTER_AUTH_SECRET }}
          CRYPTO_MASTER_KEY:     ${{ secrets.CRYPTO_LOCAL_MASTER_KEY }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          ACME_EMAIL:            ${{ vars.ACME_EMAIL }}
        with:
          host:     ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs:     ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,APP_DOMAIN,POSTGRES_PASSWORD,BETTER_AUTH_SECRET,CRYPTO_MASTER_KEY,OPENAI_API_KEY,ACME_EMAIL
          script: |
            set -euo pipefail
            echo "=== Deploying tag: $IMAGE_TAG ==="

            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            SERVER_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:server-$IMAGE_TAG"
            WEB_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:web-$IMAGE_TAG"

            # Write runtime config from GitHub secrets / variables
            mkdir -p /opt/seta
            cat > /opt/seta/.env <<EOF
            NODE_ENV=production
            PLATFORM_IMAGE_SERVER=$SERVER_IMAGE
            PLATFORM_IMAGE_WEB=$WEB_IMAGE
            PLATFORM_MODULES=*
            PLATFORM_DOMAIN=$APP_DOMAIN
            PLATFORM_ACME_EMAIL=$ACME_EMAIL
            PLATFORM_TLS_MODE=letsencrypt
            DATABASE_URL=postgres://seta:${POSTGRES_PASSWORD}@postgres:5432/seta
            POSTGRES_USER=seta
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=seta
            PORT=3000
            PUBLIC_URL=https://$APP_DOMAIN
            BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
            SESSION_COOKIE_SAMESITE=strict
            CORS_ORIGINS=https://$APP_DOMAIN
            OPENAI_API_KEY=$OPENAI_API_KEY
            CRYPTO_KEY_PROVIDER=env
            CRYPTO_LOCAL_MASTER_KEY=$CRYPTO_MASTER_KEY
            EVENTS_RETENTION_DAYS=30
            DLQ_ALERT_THRESHOLD=100
            KNOWLEDGE_AV_REQUIRED=false
            MAILER_DEFAULT_TRANSPORT=dev-stub
            MAILER_DEFAULT_SENDER=noreply@$APP_DOMAIN
            EOF
            chmod 600 /opt/seta/.env

            cd /opt/platform
            REPO_RAW="https://raw.githubusercontent.com/Seta-International/agent-platform/main"
            curl -fsSL "$REPO_RAW/compose.yml" -o compose.yml

            # Fetch Traefik config and substitute the domain placeholder
            mkdir -p infra/traefik/dynamic
            curl -fsSL "$REPO_RAW/infra/traefik/traefik.yml"        -o infra/traefik/traefik.yml
            curl -fsSL "$REPO_RAW/infra/traefik/dynamic/routes.yml" -o infra/traefik/dynamic/routes.yml
            sed -i "s/DOMAIN_PLACEHOLDER/$APP_DOMAIN/g" infra/traefik/dynamic/routes.yml
            # jaeger-auth is not in the repo; create a default only on first deploy
            if [ ! -f infra/traefik/jaeger-auth ]; then
              printf 'admin:%s\n' "$(openssl passwd -apr1 'hackathon')" > infra/traefik/jaeger-auth
            fi

            # First-run guard: disable host nginx so Traefik can own ports 80/443
            if systemctl is-active --quiet nginx; then
              sudo systemctl stop nginx
              sudo systemctl disable nginx
            fi

            docker compose --env-file /opt/seta/.env pull server web worker

            # 1. Run migrations BEFORE starting app containers so the server
            #    never boots against a schema that's behind.
            docker compose --env-file /opt/seta/.env run --rm migrator

            # 2. Start app containers and wait until every healthcheck passes
            #    (or fail fast if any container becomes unhealthy).
            docker compose --env-file /opt/seta/.env up -d \
              --no-deps --remove-orphans --wait --wait-timeout 120 \
              proxy server web worker

            # 3. Smoke-test: verify the API health endpoint responds 200.
            echo "=== Smoke test ==="
            for i in $(seq 1 10); do
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 "https://$APP_DOMAIN/api/health" || true)
              [ "$code" = "200" ] && break
              echo "  attempt $i: got $code, retrying in 5s…"
              sleep 5
            done
            [ "$code" = "200" ] \
              || { echo "❌ Smoke test failed (last status: $code)"; exit 1; }
            echo "✅ Smoke test passed"

            # Remove dangling images left by previous deploys
            docker image prune -f

            echo "=== Deploy complete: $IMAGE_TAG ==="
